<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah_7c7c7c" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7c7c7c"/></marker>
  </defs>
  <text x="490.0" y="30.0" font-size="23" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="bold">Hierarchical cue accumulation</text>
  <text x="490.0" y="55.0" font-size="13" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal" font-style="italic">Classify each temporal motif (needs depth), then count across the delay (needs time)</text>
  <rect x="70.0" y="80.0" width="470.0" height="172.0" fill="#FBFBFD" stroke="#cfcfcf" stroke-width="1.2" rx="10" ry="10"/>
  <text x="305.0" y="104.0" font-size="15" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="bold">Each cue is a temporal motif</text>
  <line x1="148.0" y1="160.0" x2="232.0" y2="160.0" stroke="#7c7c7c" stroke-width="1.0" stroke-dasharray="3,3"/>
  <polyline points="158.0,160.0 158.0,183.0 222.0,137.0 222.0,160.0" fill="none" stroke="#4C78A8" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="190.0" y="204.0" font-size="13" fill="#4C78A8" text-anchor="middle" dominant-baseline="central" font-weight="bold">rising  ↗</text>
  <line x1="358.0" y1="160.0" x2="442.0" y2="160.0" stroke="#7c7c7c" stroke-width="1.0" stroke-dasharray="3,3"/>
  <polyline points="368.0,160.0 368.0,137.0 432.0,183.0 432.0,160.0" fill="none" stroke="#E4794A" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="400.0" y="204.0" font-size="13" fill="#E4794A" text-anchor="middle" dominant-baseline="central" font-weight="bold">falling  ↘</text>
  <text x="305.0" y="236.0" font-size="11" fill="#777777" text-anchor="middle" dominant-baseline="central" font-weight="normal" font-style="italic">same mean (≈0) &amp; energy — differ only in temporal order (slope sign)</text>
  <text x="580.0" y="98.0" font-size="13" fill="#3f3f3f" text-anchor="start" dominant-baseline="central" font-weight="bold">Why this is harder for deep RNNs</text>
  <text x="580.0" y="124.0" font-size="12" fill="#555555" text-anchor="start" dominant-baseline="central" font-weight="normal">The side is NOT handed over on a</text>
  <text x="580.0" y="143.0" font-size="12" fill="#555555" text-anchor="start" dominant-baseline="central" font-weight="normal">dedicated channel (as in plain cue</text>
  <text x="580.0" y="162.0" font-size="12" fill="#555555" text-anchor="start" dominant-baseline="central" font-weight="normal">accumulation). It is hidden in the</text>
  <text x="580.0" y="181.0" font-size="12" fill="#555555" text-anchor="start" dominant-baseline="central" font-weight="normal">temporal shape — so a single layer,</text>
  <text x="580.0" y="200.0" font-size="12" fill="#555555" text-anchor="start" dominant-baseline="central" font-weight="normal">or a random/un-learned projection,</text>
  <text x="580.0" y="219.0" font-size="12" fill="#555555" text-anchor="start" dominant-baseline="central" font-weight="normal">cannot simply read it off.</text>
  <text x="163.0" y="300.0" font-size="12" fill="#3f3f3f" text-anchor="end" dominant-baseline="central" font-weight="bold">Feature</text>
  <text x="163.0" y="315.0" font-size="12" fill="#3f3f3f" text-anchor="end" dominant-baseline="central" font-weight="bold">channel</text>
  <line x1="175.0" y1="300.0" x2="692.0" y2="300.0" stroke="#7c7c7c" stroke-width="1.1"/>
  <polyline points="205.0,300.0 205.0,326.0 259.0,274.0 259.0,300.0" fill="none" stroke="#4C78A8" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="323.0,300.0 323.0,274.0 377.0,326.0 377.0,300.0" fill="none" stroke="#E4794A" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="441.0,300.0 441.0,326.0 495.0,274.0 495.0,300.0" fill="none" stroke="#4C78A8" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <rect x="517.0" y="266.0" width="175.0" height="68.0" fill="#ECECEC" stroke="#cccccc" stroke-width="1.0"/>
  <text x="604.5" y="286.0" font-size="12" fill="#888888" text-anchor="middle" dominant-baseline="central" font-weight="bold">delay</text>
  <line x1="722.0" y1="260.0" x2="722.0" y2="340.0" stroke="#336633" stroke-width="1.6" stroke-dasharray="3,3"/>
  <text x="722.0" y="250.0" font-size="12" fill="#336633" text-anchor="middle" dominant-baseline="central" font-weight="bold">recall</text>
  <line x1="175.0" y1="352.0" x2="698.0" y2="352.0" stroke="#7c7c7c" stroke-width="1.3" marker-end="url(#ah_7c7c7c)"/>
  <text x="704.0" y="352.0" font-size="12" fill="#888888" text-anchor="start" dominant-baseline="central" font-weight="normal">time</text>
  <line x1="205.0" y1="360.0" x2="205.0" y2="416.0" stroke="#7c7c7c" stroke-width="1.4" marker-end="url(#ah_7c7c7c)"/>
  <rect x="70.0" y="420.0" width="270.0" height="86.0" fill="#DDEEFF" stroke="#335577" stroke-width="1.6" rx="10" ry="10"/>
  <text x="205.0" y="442.0" font-size="13.5" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="bold">Layer 1 — fast  (α ≈ 0.7)</text>
  <text x="205.0" y="464.0" font-size="12.5" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="normal">classify each motif:  ↗ / ↘</text>
  <text x="205.0" y="485.0" font-size="11" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal" font-style="italic">temporal feature extractor</text>
  <rect x="380.0" y="420.0" width="270.0" height="86.0" fill="#EEE0FF" stroke="#553388" stroke-width="1.6" rx="10" ry="10"/>
  <text x="515.0" y="442.0" font-size="13.5" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="bold">Layer 2 — slow  (α ≈ 0.1)</text>
  <text x="515.0" y="464.0" font-size="12.5" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="normal">count + hold through delay</text>
  <text x="515.0" y="485.0" font-size="11" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal" font-style="italic">integrator</text>
  <rect x="700.0" y="420.0" width="210.0" height="86.0" fill="#FFFFFF" stroke="#3f3f3f" stroke-width="1.6" rx="10" ry="10"/>
  <text x="805.0" y="446.0" font-size="13.5" fill="#3f3f3f" text-anchor="middle" dominant-baseline="central" font-weight="bold">Decide</text>
  <text x="805.0" y="472.0" font-size="13" fill="#336633" text-anchor="middle" dominant-baseline="central" font-weight="bold">rising-majority</text>
  <text x="805.0" y="490.0" font-size="11" fill="#336633" text-anchor="middle" dominant-baseline="central" font-weight="normal">(2 vs 1)</text>
  <line x1="344.0" y1="463.0" x2="376.0" y2="463.0" stroke="#7c7c7c" stroke-width="1.6" marker-end="url(#ah_7c7c7c)"/>
  <line x1="654.0" y1="463.0" x2="696.0" y2="463.0" stroke="#7c7c7c" stroke-width="1.6" marker-end="url(#ah_7c7c7c)"/>
  <text x="490.0" y="540.0" font-size="12.5" fill="#555555" text-anchor="middle" dominant-baseline="central" font-weight="normal" font-style="italic">Credit for an early cue must travel UP (depth) and FORWARD (time) — the decisive test for deep e-prop.</text>
</svg>
